<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utmaning i Klokr!</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #1a2a42; color: white; }
        .box { background-color: #243b55; padding: 30px; border-radius: 16px; display: inline-block; max-width: 80%; }
        h1 { color: #FFD700; }
        a.button { display: inline-block; margin-top: 20px; padding: 15px 30px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        a.button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="box">
        <h1>Du har blivit utmanad! ⚔️</h1>
        <p>Den här länken öppnar en utmaning i spelet <strong>Klokr</strong>.</p>
        <p>Laddar spelet... Om appen inte öppnas automatiskt, klicka på knappen nedan!</p>
        
        <a href="#" id="openAppBtn" class="button">Öppna Utmaningen i Appen</a>
    </div>

    <script>
        window.onload = function() {
            var urlParams = new URLSearchParams(window.location.search);
            var id = urlParams.get('id');
            var level = urlParams.get('level');
            
            if(id) {
                // Bygger intent-länken med båda dina parametrar OCH en fallback till Google Play
                var levelParam = level ? "&level=" + level : "";
                var intentLink = "intent://klokr.se/challenge?id=" + id + levelParam + "#Intent;scheme=https;package=se.klokr.app;S.browser_fallback_url=https://play.google.com/store/apps/details?id=se.klokr.app;end;";
                
                // 1. Sätt länken på knappen ifall de måste klicka manuellt
                document.getElementById('openAppBtn').href = intentLink;

                // 2. Tvinga webbläsaren att försöka öppna appen automatiskt efter 0.5 sekunder
                setTimeout(function() {
                    window.location.href = intentLink;
                }, 500);
            }
        };
    </script>
</body>
</html>
